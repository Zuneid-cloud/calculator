<!DOCTYPE html>
<html>
<head>
    <title>iPhone Calculator</title>
    <style>
        body {
            background: linear-gradient(135deg, #1c1c1c, #000);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .calculator {
            width: 320px;
            background: #000;
            padding: 20px;
            border-radius: 40px;
            box-shadow: 0 0 40px rgba(255,255,255,0.1);
        }

        .display {
            color: white;
            font-size: 50px;
            text-align: right;
            margin-bottom: 20px;
            padding: 10px;
            background: transparent;
            border: none;
            width: 100%;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 70px;
            border-radius: 50%;
            border: none;
            font-size: 22px;
            cursor: pointer;
            transition: 0.15s;
        }

        button:active {
            transform: scale(0.9);
            filter: brightness(1.3);
        }

        .gray {
            background: #a5a5a5;
        }

        .dark {
            background: #333;
            color: white;
        }

        .orange {
            background: #ff9500;
            color: white;
            box-shadow: 0 0 10px #ff9500;
        }

        .zero {
            grid-column: span 2;
            border-radius: 35px;
            text-align: left;
            padding-left: 25px;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" class="display" id="display" value="{{ result }}" readonly>

    <form method="POST">
        <div class="buttons">

            <button type="button" class="gray" onclick="clearDisplay()">AC</button>
            <button type="button" class="gray">+/-</button>
            <button type="button" class="gray">%</button>
            <button type="button" class="orange" onclick="setOp('/')">÷</button>

            <button type="button" class="dark" onclick="addNum('7')">7</button>
            <button type="button" class="dark" onclick="addNum('8')">8</button>
            <button type="button" class="dark" onclick="addNum('9')">9</button>
            <button type="button" class="orange" onclick="setOp('*')">×</button>

            <button type="button" class="dark" onclick="addNum('4')">4</button>
            <button type="button" class="dark" onclick="addNum('5')">5</button>
            <button type="button" class="dark" onclick="addNum('6')">6</button>
            <button type="button" class="orange" onclick="setOp('-')">−</button>

            <button type="button" class="dark" onclick="addNum('1')">1</button>
            <button type="button" class="dark" onclick="addNum('2')">2</button>
            <button type="button" class="dark" onclick="addNum('3')">3</button>
            <button type="button" class="orange" onclick="setOp('+')">+</button>

            <button type="button" class="dark zero" onclick="addNum('0')">0</button>
            <button type="button" class="dark" onclick="addNum('.')">.</button>
            <button type="submit" class="orange">=</button>

        </div>

        <input type="hidden" name="num1" id="num1">
        <input type="hidden" name="num2" id="num2">
        <input type="hidden" name="operation" id="operation">
    </form>
</div>

<script>
    let first = "";
    let second = "";
    let op = "";
    let isSecond = false;

    function addNum(num) {
        if (!isSecond) {
            first += num;
            document.getElementById("display").value = first;
        } else {
            second += num;
            document.getElementById("display").value = second;
        }
    }

    function setOp(operator) {
        op = operator;
        isSecond = true;
        document.getElementById("operation").value = op;
        document.getElementById("num1").value = first;
    }

    function clearDisplay() {
        first = "";
        second = "";
        op = "";
        isSecond = false;
        document.getElementById("display").value = "";
    }

    document.querySelector("form").addEventListener("submit", function() {
        document.getElementById("num2").value = second;
    });

    
</script>

</body>
</html>
